global:
  scrape_interval: 2s
  evaluation_interval: 2s

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
- job_name: otel-collector
  static_configs:
  - targets:
    - 'collector:8888'
- job_name: prometheus
  honor_timestamps: true
  scrape_interval: 15s
  scrape_timeout: 10s
  metrics_path: /metrics
  scheme: http
  static_configs:
  - targets:
    - localhost:9090
- job_name: backoffice-bff
  metrics_path: /actuator/prometheus
  static_configs:
  - targets:
    - 'host.docker.internal:8087'
- job_name: storefront-bff
  metrics_path: /actuator/prometheus
  static_configs:
  - targets:
    - 'host.docker.internal:8089'